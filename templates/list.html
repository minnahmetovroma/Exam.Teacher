{% extends "base.html" %}

{% block content %}
    <h1>{{ title }}</h1>
    <div class="list-group mt-3">
        {% for item in items %}
            <a href="/{{ url }}/{{ item['id'] }}" class="list-group-item list-group-item-action">
                {{ item['name'] }}
                {% if item['description'] %}
                    <small class="text-muted d-block">{{ item['description'] }}</small>
                {% endif %}
            </a>
        {% endfor %}
    </div>
{% endblock %}

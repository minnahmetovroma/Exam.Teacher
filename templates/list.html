{% extends "base.html" %}

{% block content %}
    <h1>{{ title }}</h1>
    <div class="list-group mt-3">
        {% for item in items %}
            <a href="/{{ url }}/{{ item[0] }}" class="list-group-item list-group-item-action">
                {{ item[1] }}
                {% if item[2] %}
                    <small class="text-muted d-block">{{ item[2] }}</small>
                {% endif %}
            </a>
        {% endfor %}
    </div>
{% endblock %}

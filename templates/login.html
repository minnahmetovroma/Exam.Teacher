{% extends "base.html" %}

{% block content %}

<style>
    .form-container {
        background-color: #ffffff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 300px;
        margin: 40px auto;
    }
    .form-container h2 {
        text-align: center;
        color: #333333;
        margin-bottom: 20px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #555555;
        font-size: 14px;
    }
    .form-group input[type="text"],
    .form-group input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #cccccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    .form-container button {
        width: 100%;
        padding: 10px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .form-container button:hover {
        background-color: #218838;
    }
    /* Добавил стиль для ссылки, чтобы она красиво смотрелась под кнопкой */
    .register-link {
        display: block;
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
    }
</style>

<div class="form-container">
    <h2>Вход</h2>

    {% if title %}
        <small style="color: {{ color }}; display: block; text-align: center; margin-bottom: 10px;">
            {{ title }}
        </small>
    {% endif %}

    <form action="" method="POST">
        <div class="form-group">
            <label for="email">Почта:</label>
            <input type="text" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Войти</button>
    </form>

    <a href="/register/" class="register-link">
        <small class="text-muted">Нет аккаунта? Регистрация</small>
    </a>
</div>

{% endblock %}

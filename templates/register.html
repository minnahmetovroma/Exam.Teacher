{% extends "base.html" %}

{% block content %}

<style>
    .form-container {
        background-color: #ffffff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 300px;
        margin: 40px auto; /* Эта строчка отцентрирует форму по середине экрана */
    }
    .form-container h2 {
        text-align: center;
        color: #333333;
        margin-bottom: 20px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #555555;
        font-size: 14px;
    }
    .form-group input[type="text"],
    .form-group input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #cccccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    .radio-group {
        display: flex;
        gap: 15px;
        align-items: center;
    }
    .radio-group label {
        margin: 0;
        display: inline;
    }
    .form-container button {
        width: 100%;
        padding: 10px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .form-container button:hover {
        background-color: #218838;
    }
    .login-link {
        display: block;
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
    }
</style>

<div class="form-container">
    <h2>Регистрация</h2>
    <small style="color: red;">{{ title }}</small>
    <form action="" method="POST">
        
        <div class="form-group">
            <label for="surname">Фамилия:</label>
            <input type="text" id="surname" name="surname" required>
        </div>

        <div class="form-group">
            <label for="name">Имя:</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="patronymic">Отчество:</label>
            <input type="text" id="patronymic" name="patronymic" required>
        </div>

        <div class="form-group">
            <label for="email">Почта:</label>
            <input type="text" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="password_repeat">Повторите пароль:</label>
            <input type="password" id="password_repeat" name="password_repeat" required>
        </div>

        <div class="form-group">
            <label>Вы учитель?</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="is_teacher" value="yes"> Да
                </label>
                <label>
                    <input type="radio" name="is_teacher" value="no" checked> Нет
                </label>
            </div>
        </div>

        <button type="submit">Зарегистрироваться</button>
    </form>
    <a href="/login/" class="login-link">
        <small class="text-muted">Есть аккаунт? Вход</small>
    </a>
</div>

{% endblock %}
